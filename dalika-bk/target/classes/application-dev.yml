spring:
  datasource:
    url: jdbc:h2:mem:dalika_quotes;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: DevSecretKeyForTestingPurposesOnlyDoNotUseInProduction12345678901234567890
    access-token-expiration: 3600000
    refresh-token-expiration: 604800000
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

logging:
  level:
    com.dalika.quotes: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
